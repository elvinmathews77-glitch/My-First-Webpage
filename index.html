<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Interface</title>
    <style>
        /* Dark cyberpunk grid background */
        body {
            background-color: #0a0a0f;
            background-image: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 255, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Cyberpunk Button Styling */
        .cyber-btn {
            --primary-neon: #00ff66; /* Neon Green */
            --secondary-neon: #ff0055; /* Neon Pink/Red */
            
            position: relative;
            padding: 15px 35px;
            background: #12121c;
            color: var(--primary-neon);
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 2px solid var(--primary-neon);
            border-radius: 0; /* Sharp corners fit the vibe better */
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
            transition: all 0.3s ease;
            outline: none;
            
            /* Cut corner effect using clip-path */
            clip-path: polygon(92% 0, 100% 25%, 100% 100%, 8% 100%, 0% 75%, 0 0);
        }

        /* Hover and Tech-Glitch Effects */
        .cyber-btn:hover {
            color: #ffffff;
            background: var(--primary-neon);
            box-shadow: 0 0 30px var(--primary-neon), inset 0 0 10px rgba(0,0,0,0.5);
            text-shadow: 0 0 5px #fff;
        }

        /* Subtle bottom accent line for that sci-fi ui feel */
        .cyber-btn::after {
            content: "SYS_INIT_";
            position: absolute;
            bottom: -20px;
            left: 0;
            font-size: 10px;
            color: var(--secondary-neon);
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--secondary-neon);
        }

        .cyber-btn:active {
            transform: scale(0.95);
            border-color: var(--secondary-neon);
            box-shadow: 0 0 30px var(--secondary-neon);
        }
    </style>
</head>
<body>

    <button class="cyber-btn" onclick="displayMessage()">
        Initialize Protocol
    </button>

    <script>
        function displayMessage() {
            // Cyberpunk themed pop-up message
            alert("⚠️ SYSTEM OVERRIDE SUCCESSFUL \n\nWelcome to the underground network, Choom. Access granted.");
        }
    </script>

</body>
</html>
